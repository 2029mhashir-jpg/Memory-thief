<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Build & Shoot - Keyboard Only</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; color: white; pointer-events: none; }
        .slot { border: 2px solid #555; padding: 10px; border-radius: 5px; text-align: center; width: 110px; }
        .active { border-color: #00ffcc; background: rgba(0,255,204,0.2); }
        #instructions { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; pointer-events: none; line-height: 1.4; }
    </style>
    <!-- Include Three.js for 3D graphics -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="instructions">
        <h3>⌨️ Keyboard Controls:</h3>
        <strong>W, A, S, D</strong> - Move Player<br>
        <strong>← / → Arrow Keys</strong> - Look Left / Right<br>
        <strong>↑ / ↓ Arrow Keys</strong> - Look Up / Down<br>
        <strong>SPACEBAR</strong> - Shoot Weapon / Place Ramp<br>
        <strong>Key 1</strong> - Equip Rivals Blaster<br>
        <strong>Key 2</strong> - Equip Fortnite Ramp<br>
        <strong>Key J</strong> - Jump
    </div>

    <div id="ui">
        <div id="slot-1" class="slot active">1: Blaster</div>
        <div id="slot-2" class="slot">2: Ramp Build</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. SETUP GAME WORLD ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // Grid Floor
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111116, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const grid = new THREE.GridHelper(200, 50, 0x4e54c8, 0x222233);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- 2. PLAYER & MOVEMENT VARIABLES ---
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = true;
        let lookLeft = false, lookRight = false, lookUp = false, lookDown = false;
        
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let currentMode = 1; 
        const builds = [];
        const projectiles = [];
        
        // Custom camera pitch/yaw system to avoid mouse lock math issues
        let cameraYaw = 0;
        let cameraPitch = 0;

        camera.position.set(0, 2, 5);

        // Keyboard Event Listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
            
            if (e.code === 'ArrowLeft') lookLeft = true;
            if (e.code === 'ArrowRight') lookRight = true;
            if (e.code === 'ArrowUp') lookUp = true;
            if (e.code === 'ArrowDown') lookDown = true;

            if (e.code === 'KeyJ' && canJump) { velocity.y += 12; canJump = false; }
            if (e.code === 'Digit1') switchMode(1);
            if (e.code === 'Digit2') switchMode(2);
            
            if (e.code === 'Space') useActiveItem();
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
            
            if (e.code === 'ArrowLeft') lookLeft = false;
            if (e.code === 'ArrowRight') lookRight = false;
            if (e.code === 'ArrowUp') lookUp = false;
            if (e.code === 'ArrowDown') lookDown = false;
        });

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('slot-1').className = mode === 1 ? 'slot active' : 'slot';
            document.getElementById('slot-2').className = mode === 2 ? 'slot active' : 'slot';
            weaponMesh.visible = (mode === 1);
            previewRamp.visible = (mode === 2);
        }

        // --- 3. CREATING GUN & RAMP MODELS ---
        const gunGeo = new THREE.BoxGeometry(0.2, 0.2, 0.8);
        const gunMat = new THREE.MeshStandardMaterial({ color: 0xff0055 }); 
        const weaponMesh = new THREE.Mesh(gunGeo, gunMat);
        weaponMesh.position.set(0.3, -0.3, -0.6);
        camera.add(weaponMesh);
        scene.add(camera);

        const rampGeo = new THREE.BoxGeometry(4, 0.2, 5.6);
        rampGeo.rotateX(Math.PI / 6); 
        const previewMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.5 });
        const previewRamp = new THREE.Mesh(rampGeo, previewMat);
        previewRamp.visible = false;
        scene.add(previewRamp);

        // --- 4. ACTION FUNCTION (SPACEBAR CLICK) ---
        function useActiveItem() {
            if (currentMode === 1) {
                // Shoot weapon
                const laserGeo = new THREE.SphereGeometry(0.15, 8, 8);
                const laserMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });
                const laser = new THREE.Mesh(laserGeo, laserMat);
                
                const pLocal = new THREE.Vector3(0.3, -0.3, -1);
                pLocal.applyMatrix4(camera.matrixWorld);
                laser.position.copy(pLocal);
                
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                laser.userData = { dir: dir, speed: 1.5, life: 60 };
                
                scene.add(laser);
                projectiles.push(laser);
            } 
            else if (currentMode === 2) {
                // Place Ramp Build
                const solidMat = new THREE.MeshStandardMaterial({ color: 0x00a8ff, roughness: 0.4, transparent: true, opacity: 0.8 });
                const builtRamp = new THREE.Mesh(rampGeo.clone(), solidMat);
                builtRamp.position.copy(previewRamp.position);
                builtRamp.rotation.copy(previewRamp.rotation);
                scene.add(builtRamp);
                builds.push(builtRamp);
            }
        }

        // --- 5. GAME ENGINE LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Handle Camera Rotation via Arrow Keys
            const rotationSpeed = 2.0 * delta;
            if (lookLeft) cameraYaw += rotationSpeed;
            if (lookRight) cameraYaw -= rotationSpeed;
            if (lookUp) cameraPitch = Math.min(Math.PI / 2.5, cameraPitch + rotationSpeed);
            if (lookDown) cameraPitch = Math.max(-Math.PI / 2.5, cameraPitch - rotationSpeed);

            // Apply rotation order to stop visual glitching
            camera.rotation.y = cameraYaw;
            camera.rotation.x = cameraPitch;
            camera.rotation.order = "YXZ";

            // Player Physics & Movement 
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 9.8 * 3.0 * delta; 

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 150.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 150.0 * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(velocity.z * delta);
            camera.position.y += velocity.y * delta;

            // Stop player from falling through the floor
            if (camera.position.y < 2) {
                velocity.y = 0;
                camera.position.y = 2;
                canJump = true;
            }

            // Keep track of build item preview positioning
            if (currentMode === 2) {
                const forwardDir = new THREE.Vector3();
                camera.getWorldDirection(forwardDir);
                forwardDir.y = 0; 
                forwardDir.normalize();
                
                previewRamp.position.copy(camera.position).addScaledVector(forwardDir, 6);
                previewRamp.position.y = Math.floor(previewRamp.position.y / 2) * 2 + 1.2; 
                previewRamp.rotation.y = cameraYaw;
            }

            // Flying laser mechanics
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.position.addScaledVector(proj.userData.dir, proj.userData.speed);
                proj.userData.life--;
                if (proj.userData.life <= 0) {
                    scene.remove(proj);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
