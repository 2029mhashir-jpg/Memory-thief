<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVALS Arena</title>
    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c16;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Menu Screen Layout */
        #menu-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #101428 0%, #05060b 100%);
        }

        /* Neon Title Style */
        .title {
            font-size: 4rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #00ffcc;
        }

        /* Controls Instructions */
        .controls {
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        /* Deploy Match Neon Button */
        #deploy-btn {
            background-color: #00ffcc;
            color: #05060b;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        #deploy-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.9);
            transform: scale(1.05);
        }

        /* Hidden Game Screen Area */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background-color: #111;
            display: block;
        }

        /* Simple HUD inside the match */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- MAIN MENU SCREEN -->
    <div id="menu-screen">
        <h1 class="title">RIVALS Arena</h1>
        <p class="controls">MOUSE = Aim & Shoot | WASD = Move | SPACE = Jump</p>
        <button id="deploy-btn">DEPLOY MATCH</button>
    </div>

    <!-- GAME ARENA SCREEN -->
    <div id="game-screen">
        <div id="hud">MATCH IN PROGRESS...</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const deployBtn = document.getElementById("deploy-btn");
            const menuScreen = document.getElementById("menu-screen");
            const gameScreen = document.getElementById("game-screen");

            // Event listener to trigger the transition
            deployBtn.addEventListener("click", () => {
                // 1. Hide the main menu
                menuScreen.style.display = "none";
                
                // 2. Display the game arena screen
                gameScreen.style.display = "block";
                
                // 3. Trigger the match setup functions
                initGameArena();
            });
        });

        // Simple placeholder game setup
        function initGameArena() {
            console.log("Match successfully deployed!");
            
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            
            // Resize canvas to fill the window
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Draw a basic placeholder player square
            ctx.fillStyle = "#00ffcc";
            ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 - 25, 50, 50);
            
            // Your future player movement, logic loop, and map mechanics will go here.
        }
    </script>
</body>
</html>
