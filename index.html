<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Laptop 3D Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            user-select: none;
        }
        #hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px;
            z-index: 10;
        }
        .slot {
            width: 65px;
            height: 65px;
            background: #333;
            border: 3px solid #666;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }
        .slot.active {
            border-color: #ffaa00;
            background: #555;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.4;
            z-index: 10;
        }
        #action-btn {
            position: absolute;
            bottom: 110px;
            right: 20px;
            width: 90px;
            height: 90px;
            background: #ffaa00;
            color: black;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
    <!-- Unblocked alternative source for the 3D Engine -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div id="instructions">
        <strong>Trackpad Controls:</strong><br>
        • <strong>WASD</strong> = Move Player<br>
        • <strong>Arrow Keys (Left/Right)</strong> = Turn Camera<br>
        • <strong>Keys 1 to 5</strong> = Switch Weapon/Build<br>
        • <strong>Click Orange Circle</strong> = Shoot / Build Wall
    </div>

    <button id="action-btn">ACTION</button>

    <div id="hud">
        <div class="slot active" id="slot1"><span>[1] Scar</span></div>
        <div class="slot" id="slot2"><span>[2] Shotty</span></div>
        <div class="slot" id="slot3"><span>[3] Sniper</span></div>
        <div class="slot" id="slot4"><span>[4] Pistol</span></div>
        <div class="slot" id="slot5"><span>[5] Build</span></div>
    </div>

    <script>
        // --- 1. SETUP ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTS & GROUND ---
        const light = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x2e8b57 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- 3. MOVEMENT VARIABLES ---
        camera.position.set(0, 2, 5);
        let moveFwd = false, moveBwd = false, turnLeft = false, turnRight = false;
        let activeSlot = 1;

        // --- 4. INPUT TRACKING ---
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveFwd = true;
            if(e.code === 'KeyS') moveBwd = true;
            if(e.code === 'ArrowLeft') turnLeft = true;
            if(e.code === 'ArrowRight') turnRight = true;
            if(['Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
                document.getElementById(`slot${activeSlot}`).classList.remove('active');
                activeSlot = parseInt(e.code.replace('Digit', ''));
                document.getElementById(`slot${activeSlot}`).classList.add('active');
            }
        });

        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveFwd = false;
            if(e.code === 'KeyS') moveBwd = false;
            if(e.code === 'ArrowLeft') turnLeft = false;
            if(e.code === 'ArrowRight') turnRight = false;
        });

        // --- 5. ACTION BUTTON (SHOOT/BUILD) ---
        const actionBtn = document.getElementById('action-btn');
        actionBtn.addEventListener('click', () => {
            if (activeSlot === 5) {
                // Build a Wall Panel
                const wall = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 2, 0.2),
                    new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
                );
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                
                wall.position.set(
                    Math.round(camera.position.x + dir.x * 4),
                    1,
                    Math.round(camera.position.z + dir.z * 4)
                );
                wall.rotation.y = camera.rotation.y;
                scene.add(wall);
            } else {
                // Fire Tracer Bullet
                const points = [
                    new THREE.Vector3(camera.position.x, camera.position.y - 0.2, camera.position.z),
                    new THREE.Vector3(camera.position.x, camera.position.y, camera.position.z - 20)
                ];
                const laser = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(points),
                    new THREE.LineBasicMaterial({ color: 0xff0000 })
                );
                scene.add(laser);
                setTimeout(() => scene.remove(laser), 60);
            }
        });

        // --- 6. GAME LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Rotate Camera with Arrow Keys
            if (turnLeft) camera.rotation.y += 2.0 * delta;
            if (turnRight) camera.rotation.y -= 2.0 * delta;

            // Move Player Forward/Backward based on facing direction
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0;
            dir.normalize();

            if (moveFwd) camera.position.addScaledVector(dir, 8 * delta);
            if (moveBwd) camera.position.addScaledVector(dir, -8 * delta);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
