<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVALS Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c16;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Menu Screen Layout */
        #menu-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #101428 0%, #05060b 100%);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* Neon Title Style */
        .title {
            font-size: 4rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #00ffcc;
        }

        /* Controls Instructions */
        .controls {
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        /* Deploy Match Neon Button */
        #deploy-btn {
            background-color: #00ffcc;
            color: #05060b;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        #deploy-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.9);
            transform: scale(1.05);
        }

        /* Game Screen Area */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background-color: #0b0c16;
            display: block;
        }

        /* HUD overlay */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffcc;
        }
    </style>
</head>
<body>

    <!-- MAIN MENU SCREEN -->
    <div id="menu-screen">
        <h1 class="title">RIVALS Arena</h1>
        <p class="controls">MOUSE = Aim & Shoot | WASD = Move | SPACE = Jump</p>
        <button id="deploy-btn">DEPLOY MATCH</button>
    </div>

    <!-- GAME ARENA SCREEN -->
    <div id="game-screen">
        <div id="hud">Match Live - Use WASD keys to move</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- GAME ENGINE SCRIPT -->
    <script>
        // Use window.onload to guarantee everything is built before starting
        window.onload = function() {
            const deployBtn = document.getElementById("deploy-btn");
            const menuScreen = document.getElementById("menu-screen");
            const gameScreen = document.getElementById("game-screen");
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            // Setup the canvas dimensions
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener("resize", resizeCanvas);

            // Player State Data
            const player = {
                x: window.innerWidth / 2 - 20,
                y: window.innerHeight / 2 - 20,
                size: 40,
                speed: 7,
                color: "#00ffcc"
            };

            // Movement Key Tracker
            const keys = { w: false, a: false, s: false, d: false };

            // Input Event Listeners
            window.addEventListener("keydown", (e) => {
                const key = e.key.toLowerCase();
                if (key in keys) keys[key] = true;
            });

            window.addEventListener("keyup", (e) => {
                const key = e.key.toLowerCase();
                if (key in keys) keys[key] = false;
            });

            // Start Button Click Action
            deployBtn.addEventListener("click", () => {
                menuScreen.style.display = "none";
                gameScreen.style.display = "block";
                
                // Recalculate dimensions right as match opens
                resizeCanvas();
                player.x = canvas.width / 2 - player.size / 2;
                player.y = canvas.height / 2 - player.size / 2;
                
                // Fire up the continuous engine loop
                requestAnimationFrame(gameLoop);
            });

            // Physics Update Engine
            function update() {
                if (keys.w && player.y > 0) player.y -= player.speed;
                if (keys.s && player.y < canvas.height - player.size) player.y += player.speed;
                if (keys.a && player.x > 0) player.x -= player.speed;
                if (keys.d && player.x < canvas.width - player.size) player.x += player.speed;
            }

            // Screen Draw Engine
            function render() {
                // Clear out previous frame artifacts
                ctx.fillStyle = "#0b0c16";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Apply neon laser glow effects to player
                ctx.shadowBlur = 20;
                ctx.shadowColor = player.color;
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.size, player.size);
                
                // Turn off shadow blur processing for faster rendering performance
                ctx.shadowBlur = 0;
            }

            // Loop Orchestrator
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }
        };
    </script>
</body>
</html>
