<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shooter Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            backgroundColor: #000;
            font-family: sans-serif;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }
    </style>
    <!-- Include Three.js for 3D Graphics -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="instructions">
        <h1>3D GUN GAME</h1>
        <p>Click to Play</p>
        <p><b>WASD</b> to Move | <b>Mouse</b> to Look | <b>Left Click</b> to Shoot</p>
    </div>

    <script>
        // --- Setup Scene, Camera, and Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(20, 40, 20);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        // --- Environment (Map) ---
        // Floor
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x228b22 }); // Grass Green
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Obstacles / Red Targets
        const targets = [];
        const targetGeo = new THREE.BoxGeometry(2, 4, 2);
        const targetMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });

        for(let i = 0; i < 15; i++) {
            const target = new THREE.Mesh(targetGeo, targetMat);
            target.position.set((Math.random() - 0.5) * 60, 2, (Math.random() - 0.5) * 60);
            target.castShadow = true;
            scene.add(target);
            targets.push(target);
        }

        // --- Player & Gun Setup ---
        camera.position.set(0, 2, 5);
        
        // Simple Gun Model (Attached to Camera)
        const gunGeo = new THREE.BoxGeometry(0.2, 0.2, 1);
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const gun = new THREE.Mesh(gunGeo, gunMat);
        gun.position.set(0.3, -0.3, -0.8); // Position relative to camera
        camera.add(gun);
        scene.add(camera); // Add camera to scene to see the gun

        // --- Controls State ---
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let score = 0;

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const clock = new THREE.Clock();

        // --- Pointer Lock (FPS Mouse Look) ---
        const instructions = document.getElementById('instructions');
        
        instructions.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.style.display = 'none';
            } else {
                instructions.style.display = 'flex';
            }
        });

        // Mouse Rotation
        let pitch = 0;
        let yaw = 0;
        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement !== document.body) return;

            yaw -= event.movementX * 0.002;
            pitch -= event.movementY * 0.002;

            // Clamp vertical look to prevent flipping upside down
            pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch));

            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        });

        // Keyboard Movement
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
        });

        // --- Shooting System (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const centerMouse = new THREE.Vector2(0, 0); // Center of screen

        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body) return;
            if (e.button !== 0) return; // Only left click

            // Gun recoil visual effect
            gun.position.z = -0.6;
            setTimeout(() => gun.position.z = -0.8, 50);

            // Shoot Raycast
            raycaster.setFromCamera(centerMouse, camera);
            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitTarget = intersects[0].object;
                
                // Teleport hit target to a new random location
                hitTarget.position.set((Math.random() - 0.5) * 60, 2, (Math.random() - 0.5) * 60);
                
                // Update Score
                score++;
                document.getElementById('score').innerText = score;
            }
        });

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (document.pointerLockElement === document.body) {
                // Movement physics damping
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                // Forward/Backward based on camera rotation matrix
                const camDirection = new THREE.Vector3();
                camera.getWorldDirection(camDirection);
                camDirection.y = 0; // Keep movement on flat ground
                camDirection.normalize();

                const camRight = new THREE.Vector3();
                camRight.crossVectors(camera.up, camDirection).normalize();

                if (moveForward) velocity.addScaledVector(camDirection, 40 * delta);
                if (moveBackward) velocity.addScaledVector(camDirection, -40 * delta);
                if (moveLeft) velocity.addScaledVector(camRight, 40 * delta);
                if (moveRight) velocity.addScaledVector(camRight, -40 * delta);

                camera.position.add(velocity);
            }

            renderer.render(scene, camera);
        }

        // --- Handle Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
