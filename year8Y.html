<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Thief: 3D Battle Royale Edition</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: sans-serif; 
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; }
        p { margin: 0; font-size: 16px; color: #00ffcc; }
    </style>
    <!-- Include the Three.js Engine Library -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>MEMORY THIEF</h1>
        <p>Use WASD to move around the map</p>
    </div>

    <script>
        // Global variables for the game engine
        let scene, camera, renderer, player;
        
        // Tracking keyboard inputs
        const keys = { w: false, a: false, s: false, d: false };
        const moveSpeed = 0.2;

        function init() {
            // 1. Create the 3D Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky blue background

            // 2. Set up the Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // 3. Set up the WebGL Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. Create the Ground (Green Island Placeholder)
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x228b22, side: THREE.DoubleSide });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = Math.PI / 2; // Lay it flat
            scene.add(floor);

            // 5. Create the Player (Red Character Placeholder)
            const playerGeo = new THREE.BoxGeometry(2, 4, 2);
            const playerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 2; // Raise it up so it stands on the floor
            scene.add(player);

            // Position camera slightly behind and above the player
            camera.position.set(0, 10, 20);

            // Listen for keyboard controls
            window.addEventListener('keydown', (e) => handleKeyboard(e, true));
            window.addEventListener('keyup', (e) => handleKeyboard(e, false));
            
            // Adjust screen sizes on window resize
            window.addEventListener('resize', onWindowResize);

            // Start the game loop
            animate();
        }

        // Track key states
        function handleKeyboard(event, isPressed) {
            const key = event.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = isPressed;
            if (key === 'a' || key === 'arrowleft') keys.a = isPressed;
            if (key === 's' || key === 'arrowdown') keys.s = isPressed;
            if (key === 'd' || key === 'arrowright') keys.d = isPressed;
        }

        // Handle screen resizing smoothly
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Infinite rendering frame loop
        function animate() {
            requestAnimationFrame(animate);

            // Move player based on inputs
            if (keys.w) player.position.z -= moveSpeed;
            if (keys.s) player.position.z += moveSpeed;
            if (keys.a) player.position.x -= moveSpeed;
            if (keys.d) player.position.x += moveSpeed;

            // Make the camera follow the player smoothly
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 20;
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        // Start the game once page assets load
        window.onload = init;
    </script>
</body>
</html>
