<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Battle Royale Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* 3D Game Canvas viewport */
        #gameCanvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Fortnite-style Crosshair overlay */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }

        /* Simple HUD overlay for Health and Ammo */
        #hud {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 8px;
            border-left: 5px solid #00f0ff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Click to Play screen overlay */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            text-align: center;
            z-index: 10;
        }
        #instructions {
            font-size: 28px;
            text-transform: uppercase;
            color: #f7a205;
        }
    </style>
    <!-- Load Three.js Library via CDN -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- Start Screen (Required for Mouse Lock Controls) -->
    <div id="blocker">
        <div id="instructions">
            <strong>Click to Play</strong><br><br>
            W, A, S, D = Move<br>
            MOUSE = Look Around<br>
            CLICK = Shoot
        </div>
    </div>

    <!-- UI Overlays -->
    <div id="crosshair"></div>
    <div id="hud">HP: 100 | AMMO: 30</div>

    <!-- The 3D Game World Container -->
    <div id="gameCanvas"></div>

    <!-- Link your local 3D game logic file here -->
    <script src="game.js"></script>

</body>
</html>
