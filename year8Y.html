<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Thief: 3D Battle Royale Edition</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: sans-serif; 
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; }
        p { margin: 0; font-size: 16px; color: #00ffcc; }
    </style>
    <!-- Stable, direct CDN link that requires no module mappings -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>MEMORY THIEF</h1>
        <p>Use WASD to move around the map</p>
    </div>

    <script>
        // Check if the library loaded correctly
        if (typeof THREE === 'undefined') {
            document.getElementById('ui-layer').innerHTML = "<h1>Error loading game engine. Check internet connection.</h1>";
        }

        let scene, camera, renderer, player;
        const keys = { w: false, a: false, s: false, d: false };
        const moveSpeed = 0.3;

        function init() {
            // Create the 3D scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Light blue sky

            // Setup camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Setup renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Add lighting so objects are visible
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // Create green ground grid
            const floorGeo = new THREE.PlaneGeometry(500, 500);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2; // Lay flat
            scene.add(floor);

            // Create a simple red player box (placeholder character)
            const playerGeo = new THREE.BoxGeometry(2, 4, 2);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0xd32f2f });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 2; // Sit on top of floor
            scene.add(player);

            // Add a few test buildings/obstacles to see movement tracking
            for (let i = 0; i < 15; i++) {
                const boxGeo = new THREE.BoxGeometry(4, Math.random() * 15 + 5, 4);
                const boxMat = new THREE.MeshStandardMaterial({ color: 0x757575 });
                const obstacle = new THREE.Mesh(boxGeo, boxMat);
                obstacle.position.set(
                    (Math.random() - 0.5) * 100,
                    boxGeo.parameters.height / 2,
                    (Math.random() - 0.5) * 100
                );
                scene.add(obstacle);
            }

            // Camera offset distance behind player
            camera.position.set(0, 12, 25);

            // Setup controls
            window.addEventListener('keydown', (e) => handleInput(e, true));
            window.addEventListener('keyup', (e) => handleInput(e, false));
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function handleInput(event, isPressed) {
            const key = event.key.toLowerCase();
            if (key === 'w') keys.w = isPressed;
            if (key === 'a') keys.a = isPressed;
            if (key === 's') keys.s = isPressed;
            if (key === 'd') keys.d = isPressed;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Run character movement math
            if (keys.w) player.position.z -= moveSpeed;
            if (keys.s) player.position.z += moveSpeed;
            if (keys.a) player.position.x -= moveSpeed;
            if (keys.d) player.position.x += moveSpeed;

            // Smoothly snap camera look target to player position
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 25;
            camera.lookAt(player.player ? player.position : new THREE.Vector3(player.position.x, player.position.y + 2, player.position.z));

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
