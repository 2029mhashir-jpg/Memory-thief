<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Thief: 3D Battle Royale</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #87CEEB; font-family: sans-serif; cursor: crosshair; 
        }
        #ui-layer { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #fff; pointer-events: none; text-shadow: 2px 2px 4px #000; z-index: 10; 
        }
        h1 { margin: 0; font-size: 32px; letter-spacing: 2px; color: #ffff00; }
        p { margin: 5px 0 0 0; font-size: 16px; color: #00ffcc; font-weight: bold; }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.7); padding: 15px;
            border-radius: 8px; border: 2px solid #ffff00; color: #fff; z-index: 10;
        }
        .bar { width: 180px; height: 12px; background: #333; margin-top: 5px; border: 1px solid #fff; }
        #hp { height: 100%; background: #ff1744; width: 100%; }
        #shield { height: 100%; background: #00e5ff; width: 100%; }
        #kill-feed { position: absolute; top: 100px; right: 20px; color: #ffeb3b; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; display: none; font-family: monospace; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>MEMORY THIEF: BATTLE ROYALE</h1>
        <p>WASD to Move | Mouse to Aim | TRUE 3D FORTNITE PERSPECTIVE VIEW</p>
    </div>

    <div id="kill-feed">ELIMINATION!</div>

    <div id="hud">
        SHIELD <div class="bar"><div id="shield"></div></div>
        HEALTH <div class="bar"><div id="hp"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Player Configuration Space Tracker
        const player = { x: 1000, y: 1000, size: 18, speed: 4, angle: 0, health: 100, shield: 100 };
        const keys = { w: false, a: false, s: false, d: false };
        const mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
        const mapSize = 2000;

        const obstacles = [];
        const enemies = [];
        const bullets = [];
        let shootTimer = 0;

        // Populate map environment layout blocks
        for (let i = 0; i < 35; i++) {
            obstacles.push({
                x: Math.random() * (mapSize - 400) + 200,
                y: Math.random() * (mapSize - 400) + 200,
                w: Math.random() * 80 + 60, h: Math.random() * 80 + 60,
                color: '#5c6bc0'
            });
        }

        // Spawn opponent players
        for (let i = 0; i < 12; i++) {
            enemies.push({
                id: i,
                x: Math.random() * (mapSize - 400) + 200,
                y: Math.random() * (mapSize - 400) + 200,
                size: 16, health: 100, shield: 50,
                angle: 0, shootCooldown: Math.random() * 30
            });
        }

        window.addEventListener('keydown', (e) => { const k = e.key.toLowerCase(); if (k in keys) keys[k] = true; });
        window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (k in keys) keys[k] = false; });
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function fireBullet(x, y, angle, isEnemy) {
            bullets.push({
                x: x, y: y,
                vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12,
                isEnemy: isEnemy
            });
        }

        function damagePlayer(amount) {
            if (player.shield > 0) {
                player.shield -= amount;
                if (player.shield < 0) { player.health += player.shield; player.shield = 0; }
            } else {
                player.health -= amount;
            }
            if (player.health <= 0) {
                player.health = 100; player.shield = 100;
                player.x = 1000; player.y = 1000;
            }
            document.getElementById('hp').style.width = player.health + '%';
            document.getElementById('shield').style.width = player.shield + '%';
        }

        // 3D Perspective Math Engine to convert flat top-down coordinates to a tilted view
        function project(worldX, worldY) {
            const dx = worldX - player.x;
            const dy = worldY - player.y;

            // Rotate map alignment according to player viewing rotation angles
            const rotX = dx * Math.cos(-player.angle - Math.PI/2) - dy * Math.sin(-player.angle - Math.PI/2);
            const rotY = dx * Math.sin(-player.angle - Math.PI/2) + dy * Math.cos(-player.angle - Math.PI/2);

            // Pull position coordinates back to offset camera length behind character 
            const camZ = rotY + 280; 
            if (camZ <= 10) return null; 

            const fov = 450;
            const scale = fov / camZ;

            // Compress rendering vertical coordinates by 0.5 to form 3D perspective slant
            return {
                x: canvas.width / 2 + rotX * scale,
                y: canvas.height * 0.65 + rotY * scale * 0.45, 
                scale: scale
            };
        }

        function loop() {
            if (keys.w) { player.x += Math.cos(player.angle) * player.speed; player.y += Math.sin(player.angle) * player.speed; }
            if (keys.s) { player.x -= Math.cos(player.angle) * player.speed; player.y -= Math.sin(player.angle) * player.speed; }
            if (keys.a) { player.x += Math.sin(player.angle) * player.speed; player.y -= Math.cos(player.angle) * player.speed; }
            if (keys.d) { player.x -= Math.sin(player.angle) * player.speed; player.y += Math.cos(player.angle) * player.speed; }

            player.angle = Math.atan2(mouse.y - canvas.height * 0.65, mouse.x - canvas.width / 2);

            shootTimer++;
            if (shootTimer >= 10) { fireBullet(player.x, player.y, player.angle, false); shootTimer = 0; }

            enemies.forEach(enemy => {
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                enemy.angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);

                if (dist < 500) {
                    enemy.x += Math.cos(enemy.angle) * 1.8; enemy.y += Math.sin(enemy.angle) * 1.8;
                    enemy.shootCooldown--;
                    if (enemy.shootCooldown <= 0) {
                        fireBullet(enemy.x, enemy.y, enemy.angle, true);
                        enemy.shootCooldown = 50;
                    }
                }
            });

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.x += b.vx; b.y += b.vy;
                if (b.x < 0 || b.x > mapSize || b.y < 0 || b.y > mapSize) { bullets.splice(i, 1); continue; }

                if (b.isEnemy) {
                    if (Math.hypot(b.x - player.x, b.y - player.y) < player.size) {
                        damagePlayer(8); bullets.splice(i, 1);
                    }
                } else {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const enemy = enemies[j];
                        if (Math.hypot(b.x - enemy.x, b.y - enemy.y) < enemy.size) {
                            if (enemy.shield > 0) enemy.shield -= 25; else enemy.health -= 35;
                            bullets.splice(i, 1);
                            if (enemy.health <= 0) {
                                enemies.splice(j, 1);
                                const feed = document.getElementById('kill-feed');
                                feed.style.display = 'block'; feed.innerText = "ELIMINATED BOT_" + enemy.id;
                                setTimeout(() => feed.style.display = 'none', 1500);
                            }
                            break;
                        }
                    }
                }
            }

            // Draw Background Blue Sky
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height); 

            // Create 3D Render depth sorting layer queues
            const sceneDepthQueue = [];

            obstacles.forEach(obs => {
                const pt = project(obs.x, obs.y);
                if (pt) {
                    sceneDepthQueue.push({
                        z: pt.scale,
                        draw: () => {
                            ctx.fillStyle = obs.color;
                            ctx.fillRect(pt.x - (obs.w * pt.scale)/2, pt.y - obs.h * pt.scale, obs.w * pt.scale, obs.h * pt.scale);
                            ctx.strokeStyle = '#1a237e'; ctx.lineWidth = 1.5 * pt.scale;
                            ctx.strokeRect(pt.x - (obs.w * pt.scale)/2, pt.y - obs.h * pt.scale, obs.w * pt.scale, obs.h * pt.scale);
                        }
                    });
                }
            });

            enemies.forEach(enemy => {
                const pt = project(enemy.x, enemy.y);
                if (pt) {
                    sceneDepthQueue.push({
                        z: pt.scale,
                        draw: () => {
                            ctx.fillStyle = '#4a148c'; ctx.beginPath(); ctx.arc(pt.x, pt.y, enemy.size * pt.scale, 0, Math.PI * 2); ctx.fill();
                            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
                            
                            ctx.fillStyle = '#ff1744'; ctx.fillRect(pt.x - 12 * pt.scale, pt.y - 22 * pt.scale, 24 * pt.scale, 3);
                        }
                    });
                }
            });

            bullets.forEach(b => {
                const pt = project(b.x, b.y);
                if (pt) {
                    sceneDepthQueue.push({
                        z: pt.scale,
                        draw: () => {
                            ctx.fillStyle = b.isEnemy ? '#ff00ff' : '#ffeb3b';
                            ctx.beginPath(); ctx.arc(pt.x, pt.y, 3 * pt.scale, 0, Math.PI * 2); ctx.fill();
                        }
                    });
                }
            });

            // Depth Sort Matrix Loop (Draws furthest depth items first to build realistic perspective)
            sceneDepthQueue.sort((a, b) => a.z - b.z);

            // Draw Ground layout behind deep sorted environment queue
            ctx.fillStyle = '#2e7d32'; ctx.fillRect(0, canvas.height * 0.48, canvas.width, canvas.height);

            // Render all sorted elements onto screen canvas
            sceneDepthQueue.forEach(obj => obj.draw());

            // Draw Player Model in Foreground Viewport Space (centered, looking forward)
            ctx.save(); ctx.translate(canvas.width / 2, canvas.height * 0.72);
            ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = '#212121'; ctx.fillRect(-4, -28, 8, 24); // Extended weapon rifle barrel modeling
            ctx.restore();

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
