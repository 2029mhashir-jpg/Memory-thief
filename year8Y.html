<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Thief: 3D Battle Royale Edition</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: sans-serif; 
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; }
        p { margin: 0; font-size: 16px; color: #00ffcc; }
    </style>
    <!-- Fallback Import Maps to ensure the library mounts directly -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com"
        }
      }
    </script>
</head>
<body>

    <div id="ui-layer">
        <h1>MEMORY THIEF</h1>
        <p>Use WASD to move your character around</p>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, player;
        const keys = { w: false, a: false, s: false, d: false };
        const moveSpeed = 0.3;

        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Light blue sky

            // Setup camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Setup renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Add basic lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7).normalize();
            scene.add(light);

            // Create flat ground
            const floorGeo = new THREE.PlaneGeometry(500, 500);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x3b7a57 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Create player box
            const playerGeo = new THREE.BoxGeometry(2, 4, 2);
            const playerMat = new THREE.MeshBasicMaterial({ color: 0xe63946 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 2;
            scene.add(player);

            // Position camera behind player
            camera.position.set(0, 12, 25);

            // Control event listeners
            window.addEventListener('keydown', (e) => handleInput(e, true));
            window.addEventListener('keyup', (e) => handleInput(e, false));
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function handleInput(event, isPressed) {
            const key = event.key.toLowerCase();
            if (key === 'w') keys.w = isPressed;
            if (key === 'a') keys.a = isPressed;
            if (key === 's') keys.s = isPressed;
            if (key === 'd') keys.d = isPressed;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Handle player movements
            if (keys.w) player.position.z -= moveSpeed;
            if (keys.s) player.position.z += moveSpeed;
            if (keys.a) player.position.x -= moveSpeed;
            if (keys.d) player.position.x += moveSpeed;

            // Tie camera tracking to player coordinates
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 25;
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
