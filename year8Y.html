<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Thief: 3D Battle Royale Edition</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #87CEEB; /* Sky blue background fallback */
            font-family: sans-serif; 
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; }
        p { margin: 0; font-size: 16px; color: #00ffcc; }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>MEMORY THIEF</h1>
        <p>Use WASD to move around the map</p>
    </div>

    <!-- Built-in canvas engine that never fails to load -->
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize handling
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State
        const player = { x: 0, z: 20, speed: 0.5 };
        const keys = { w: false, a: false, s: false, d: false };

        // Generate random buildings across the map
        const buildings = [];
        for (let i = 0; i < 40; i++) {
            buildings.push({
                x: (Math.random() - 0.5) * 200,
                z: (Math.random() - 0.5) * 200,
                width: 6,
                height: Math.random() * 30 + 10,
                color: '#555555'
            });
        }

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false;
        });

        // Projection math to convert 3D coordinates into 2D screen positions
        function project(x, y, z) {
            const camX = x - player.x;
            const camZ = z - player.z;
            const fov = 400; // Camera perspective distance
            
            if (camZ <= 0.1) return null; // Behind camera view

            const scale = fov / camZ;
            return {
                x: canvas.width / 2 + camX * scale,
                y: canvas.height / 2 - (y * scale),
                scale: scale
            };
        }

        // Main Engine Loop
        function loop() {
            // 1. Handle Movement Math
            if (keys.w) player.z -= player.speed;
            if (keys.s) player.z += player.speed;
            if (keys.a) player.x -= player.speed;
            if (keys.d) player.x += player.speed;

            // 2. Clear Frame & Draw Sky
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. Draw Ground
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

            // 4. Sort objects by depth so further objects render behind closer objects
            const renderedObjects = [];

            // Project buildings into the list
            buildings.forEach(b => {
                const pBottomLeft = project(b.x - b.width/2, 0, b.z);
                const pTopRight = project(b.x + b.width/2, b.height, b.z);
                
                if (pBottomLeft && pTopRight) {
                    const depth = b.z - player.z;
                    if (depth > 0) {
                        renderedObjects.push({
                            depth: depth,
                            draw: () => {
                                ctx.fillStyle = b.color;
                                const w = pTopRight.x - pBottomLeft.x;
                                const h = pBottomLeft.y - pTopRight.y;
                                ctx.fillRect(pBottomLeft.x, pTopRight.y, w, h);
                                
                                // Add details/windows outline
                                ctx.strokeStyle = '#333';
                                ctx.lineWidth = 2;
                                ctx.strokeRect(pBottomLeft.x, pTopRight.y, w, h);
                            }
                        });
                    }
                }
            });

            // Project Player Character Box (always right in front of camera)
            const pLoc = project(player.x, 0, player.z + 15);
            if (pLoc) {
                renderedObjects.push({
                    depth: 15,
                    draw: () => {
                        ctx.fillStyle = '#D32F2F'; // Red player color
                        const pWidth = 3 * pLoc.scale;
                        const pHeight = 6 * pLoc.scale;
                        ctx.fillRect(canvas.width / 2 - pWidth / 2, canvas.height / 2 + 20, pWidth, pHeight);
                    }
                });
            }

            // Sort by depth (farthest first) and render
            renderedObjects.sort((a, b) => b.depth - a.depth);
            renderedObjects.forEach(obj => obj.draw());

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
